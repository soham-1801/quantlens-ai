# A generic, single database configuration for Alembic

[alembic]
script_location = alembic
prepend_syspath = .

# We dynamically inject the DATABASE_URL in env.py from config.py, 
# so we do not hardcode it here.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/quantlens_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
